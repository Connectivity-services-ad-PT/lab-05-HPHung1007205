version: "3.8"

services:
  # Service API FastAPI
  # Service API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}  # Đảm bảo API đọc được token bảo mật từ file .env
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      # SỬA TẠI ĐÂY: Đổi cổng kết nối healthcheck nội bộ từ 9000 về đúng 8000
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # PostgreSQL database service
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI service mẫu dùng Python HTTP server hoặc FastAPI
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-ai-lab05
    working_dir: /app
    # Chạy file main.py thông qua môi trường ảo venv đã được build sẵn
    command: ["/opt/venv/bin/python", "src/ai_service/main.py"]
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data: